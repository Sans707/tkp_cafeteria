<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de contacto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/contacto.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="/index.html">Inicio</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarText"
            aria-controls="navbarText"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="/contacto.html"
                  >Cafe</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Contacto</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Pricing</a>
              </li>
            </ul>
            <span class="navbar-text"> Moka </span>
          </div>
        </div>
      </nav>
    </header>
    <div class="container p-5 d-flex justify-content-center align-items-center">
      <div class="Informacion">
        <h1>Contáctanos</h1>
        <h2>Dirección</h2>
        <p>Av. San Martín 742, Córdoba, Argentina</p>
        <h2>Nuestro Whatsapp</h2>
        <a href="#">+54 370 4009807</a>
        <br />
        <br />
        <h2>Nuestra Ubicación</h2>
        <a
          href="https://www.google.com/maps/place/San+Mart%C3%ADn+742,+X5000+C%C3%B3rdoba/@-31.4074111,-64.1804187,19z/data=!4m5!3m4!1s0x9432987720f1275d:0x8821ee810561d03f!8m2!3d-31.4075107!4d-64.1802336?entry=ttu&g_ep=EgoyMDI2MDQyMS4wIKXMDSoASAFQAw%3D%3D"
          target="_blank"
          ><img
            src="/assets/Imagen_ubicacion/Ubicacion_cafeteria.png"
            alt="Ubicacion de la cafeteria"
          />
        </a>
        <br />
        <br />
        <h2>Nuestro Correo</h2>
        <a href="contactocafeteria@gmail.com">contactocafeteria@gmail.com</a>
      </div>
      <br />
      <div class="col-md-6">
        <div class="formcontacto">
          <label for="formulariocontacto">
            <h4>¿Quieres más información acerca de nuestros productos?</h4>
          </label>
          <input
            type="tel"
            name="tel"
            id="telefono"
            placeholder="Tu número"
            class="form-control"
          />
        </div>
        <br />
        <h1>¿Quieres informar de un problema?</h1>
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label"
            >Dejanos tu correo para comunicarnos contigo</label
          >
          <input
            type="email"
            class="form-control"
            id="exampleFormControlInput1"
            placeholder="tucorreo@gmail.com"
          />
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1" class="form-label"
            >¿Puedes describir brevemente tu problema?</label
          >
          <textarea
            class="form-control"
            id="exampleFormControlTextarea1"
            rows="3"
            required
          ></textarea>
          <button class="btn btn-primary" type="submit">
            Enviar Comentario
          </button>
        </div>
      </div>
      <footer class="footer_idex">
        <div class="col-md-4 d-flex align-items-center">
          <a
            href="/"
            class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1"
            aria-label="Bootstrap"
          >
            <svg class="bi" width="30" height="24" aria-hidden="true">
              <use xlink:href="#bootstrap"></use>
            </svg>
          </a>
          <span class="marca">©2026 Moka</span>
        </div>
        <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
          <li class="ms-3">
            <a class="texto_footer" href="#" aria-label="Instagram"
              ><svg class="bi" width="24" height="24" aria-hidden="true">
                <use xlink:href="#instagram"></use></svg
            ></a>
          </li>
          <li class="ms-3">
            <a class="text-body-secondary" href="#" aria-label="Facebook"
              ><svg class="bi" width="24" height="24">
                <use xlink:href="#facebook"></use></svg
            ></a>
          </li>
        </ul>
      </footer>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
